<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Donor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #b40000; }
        form { max-width: 400px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        .error { color: red; }
        .btn { padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 20px; }
        .btn:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>Add New Donor</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/donors/add}" method="post" th:object="${donor}">
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></div>

        <label for="fatherName">Father Name:</label>
        <input type="text" id="fatherName" th:field="*{fatherName}" required>
        <div th:if="${#fields.hasErrors('fatherName')}" th:errors="*{fatherName}" class="error"></div>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required>
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></div>

        <label for="bloodGroup">Blood Group:</label>
        <select id="bloodGroup" th:field="*{bloodGroup}" required>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select>
        <div th:if="${#fields.hasErrors('bloodGroup')}" th:errors="*{bloodGroup}" class="error"></div>

        <label for="contact">Contact:</label>
        <input type="text" id="contact" th:field="*{contact}" required>
        <div th:if="${#fields.hasErrors('contact')}" th:errors="*{contact}" class="error"></div>

        <button type="submit" class="btn">Add Donor</button>
    </form>

    <br>
    <a href="/donors">Back to List</a>
</body>
</html>
