<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Donor | Blood Bank System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h1>Edit Donor Details</h1>
        
        <div class="glass-card">
            <div th:if="${error}" class="btn btn-danger" style="width: 100%; margin-bottom: 20px; cursor: default;" th:text="${error}"></div>

            <form th:action="@{/donors/edit/{id}(id=${donor.id})}" method="post" th:object="${donor}">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Enter donor's full name" required>
                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: #ff5252; font-size: 0.8rem; margin-top: 5px;"></div>
                </div>

                <div class="form-group">
                    <label for="fatherName">Father's Name</label>
                    <input type="text" id="fatherName" th:field="*{fatherName}" class="form-control" placeholder="Enter father's name" required>
                    <div th:if="${#fields.hasErrors('fatherName')}" th:errors="*{fatherName}" style="color: #ff5252; font-size: 0.8rem; margin-top: 5px;"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="example@mail.com" required>
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #ff5252; font-size: 0.8rem; margin-top: 5px;"></div>
                </div>

                <div class="form-group">
                    <label for="bloodGroup">Blood Group</label>
                    <select id="bloodGroup" th:field="*{bloodGroup}" class="form-control" required>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                    <div th:if="${#fields.hasErrors('bloodGroup')}" th:errors="*{bloodGroup}" style="color: #ff5252; font-size: 0.8rem; margin-top: 5px;"></div>
                </div>

                <div class="form-group">
                    <label for="contact">Contact Number</label>
                    <input type="text" id="contact" th:field="*{contact}" class="form-control" placeholder="10-digit mobile number" required>
                    <div th:if="${#fields.hasErrors('contact')}" th:errors="*{contact}" style="color: #ff5252; font-size: 0.8rem; margin-top: 5px;"></div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Update Record</button>
                    <a href="/donors" class="btn btn-secondary" style="flex: 1;">Cancel</a>
                </div>
            </form>
        </div>

        <div class="footer">
            Carefully verify changes before updating.
        </div>
    </div>
</body>
</html>
